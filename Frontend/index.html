<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenAI – Modern AI Resume Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              dm: ['DM Sans', 'sans-serif'],
            },
            colors: {
              navy: {
                950: '#060b14',
                900: '#0a0f1a',
                800: '#0d1421',
                700: '#111827',
                600: '#1a2540',
              },
            },
          },
        },
      }
    </script>
    <style>
      * { font-family: 'DM Sans', sans-serif; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0a0f1a; }
      ::-webkit-scrollbar-thumb { background: rgba(79,142,247,0.35); border-radius: 4px; }
      ::selection { background: rgba(79,142,247,0.3); color: #fff; }
    </style>
  </head>
  <body class="bg-[#0a0f1a] text-slate-300 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
